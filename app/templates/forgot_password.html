{% extends "base.html" %}

{% block title %}UWAGuessr - Forgot Password{% endblock %}
{% block body_class %}page-login{% endblock %}

{% block content %}
  <div class="page-wrap">
    <div class="card-shell">
      <div class="map-panel">
        <svg viewBox="0 0 340 520" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>

      <div class="form-panel">
        <img
          src="{{ url_for('static', filename='images/UWAGuessr-logo.png') }}"
          alt="UWAGuessr Logo"
          class="brand-logo"
        />
        <div class="brand-sub">Explore UWA</div>

        <div class="alert-area" id="alertArea"></div>

        <form id="forgotPasswordForm" novalidate>
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="email@example.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label" for="securityAnswer">Security Answer</label>
            <input
              type="text"
              class="form-control"
              id="securityAnswer"
              name="securityAnswer"
              placeholder="Enter your security answer"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label" for="newPassword">New Password</label>
            <input
              type="password"
              class="form-control"
              id="newPassword"
              name="newPassword"
              placeholder="•••••••••••"
              autocomplete="new-password"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label" for="confirmPassword">Confirm Password</label>
            <input
              type="password"
              class="form-control"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="•••••••••••"
              autocomplete="new-password"
              required
            />
          </div>

          <button type="submit" class="btn-signin" id="resetBtn">
            <span class="spinner-border" role="status" aria-hidden="true"></span>
            <span class="btn-label">Reset Password</span>
          </button>
        </form>

        <div class="form-footer">
          Remember your password? <a href="{{ url_for('login') }}">Back to login</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    $(function () {
        // Random pins
        const NUM_PINS = 5;
        const MARGIN = 20,
          W = 340,
          H = 520;
        const SVG_NS = "http://www.w3.org/2000/svg";
        const PIN_COLOURS = [
          "#E24B4A",
          "#185FA5",
          "#8B3FBF",
          "#F2C94C",
          "#000000",
          "#FF2D55",
          "#00C7FF",
          "#FF8C00",
          "#FFD700",
          "#FF1493",
        ];

        function makeSVGEl(tag, attrs) {
          const el = document.createElementNS(SVG_NS, tag);
          $.each(attrs, function (k, v) {
            el.setAttribute(k, v);
          });
          return el;
        }

        const svg = $("svg")[0];

        for (let i = 0; i < NUM_PINS; i++) {
          const cx = MARGIN + Math.random() * (W - MARGIN * 2);
          const cy = MARGIN + 18 + Math.random() * (H - MARGIN * 2 - 18);
          const colour =
            PIN_COLOURS[Math.floor(Math.random() * PIN_COLOURS.length)];

          const g = document.createElementNS(SVG_NS, "g");
          g.setAttribute("class", "pin");
          g.style.animationDelay = i * 0.3 + "s";

          g.appendChild(
            makeSVGEl("circle", { cx: cx, cy: cy, r: 11, fill: colour }),
          );
          g.appendChild(
            makeSVGEl("polygon", {
              points:
                cx +
                "," +
                (cy + 18) +
                " " +
                (cx - 7) +
                "," +
                (cy + 8) +
                " " +
                (cx + 7) +
                "," +
                (cy + 8),
              fill: colour,
            }),
          );
          g.appendChild(
            makeSVGEl("circle", { cx: cx, cy: cy, r: 4.5, fill: "white" }),
          );

          svg.appendChild(g);
        }

        // ── Helper: show an alert in the alert area ────────────────────────────
        function showAlert(message, type) {
          const html =
            '<div class="alert alert-' +
            type +
            ' alert-dismissible fade show py-2 px-3 mb-0" role="alert" style="font-size:13.5px;">' +
            message +
            '<button type="button" class="btn-close btn-sm" data-bs-dismiss="alert" aria-label="Close"></button>' +
            "</div>";
          $("#alertArea").html(html);
        }

        // ── Helper: basic email format check ──────────────────────────────────
        function isValidEmail(email) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // ── Forgot password form submit ────────────────────────────────────────
        $("#forgotPasswordForm").on("submit", function (e) {
          e.preventDefault();

          const email = $("#email").val().trim();
          const securityAnswer = $("#securityAnswer").val().trim();
          const newPassword = $("#newPassword").val();
          const confirmPassword = $("#confirmPassword").val();

          if (!email || !isValidEmail(email)) {
            showAlert("Please enter a valid email address.", "danger");
            $("#email").trigger("focus");
            return;
          }
          if (!securityAnswer) {
            showAlert("Please enter your security answer.", "danger");
            $("#securityAnswer").trigger("focus");
            return;
          }
          if (!newPassword) {
            showAlert("Please enter a new password.", "danger");
            $("#newPassword").trigger("focus");
            return;
          }
          if (!confirmPassword) {
            showAlert("Please confirm your new password.", "danger");
            $("#confirmPassword").trigger("focus");
            return;
          }
          if (newPassword !== confirmPassword) {
            showAlert("Passwords do not match.", "danger");
            $("#newPassword").trigger("focus");
            return;
          }

          const $btn = $("#resetBtn");
          $btn.addClass("loading").prop("disabled", true);
          $btn.find(".btn-label").text("Resetting…");

          $.ajax({
            url: "/api/forgot-password",
            method: "POST",
            contentType: "application/json",
            data: JSON.stringify({
              email: email,
              security_answer: securityAnswer,
              new_password: newPassword,
            }),
            success: function (response) {
              showAlert("Password reset successfully! Redirecting to login…", "success");
              setTimeout(function () {
                window.location.href = "{{ url_for('login') }}";
              }, 900);
            },
            error: function (xhr) {
              let msg = "Something went wrong. Please try again.";
              if (xhr.status === 401) msg = "Email or security answer is incorrect.";
              if (xhr.status === 404) msg = "Account not found.";
              if (xhr.status === 429)
                msg = "Too many attempts. Please wait a moment.";
              showAlert(msg, "danger");
            },
            complete: function () {
              $btn.removeClass("loading").prop("disabled", false);
              $btn.find(".btn-label").text("Reset Password");
            },
          });
        });

        // ── Auto-focus email field ─────────────────────────────────────────────
        $("#email").trigger("focus");
      });
    </script>
{% endblock %}

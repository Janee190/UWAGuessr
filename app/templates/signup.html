{% extends "base.html" %}

{% block title %}UWAGuessr - Sign Up{% endblock %}
{% block body_class %}page-login{% endblock %}

{% block content %}
  <div class="page-wrap">
    <div class="card-shell">
      <div class="map-panel">
        <svg viewBox="0 0 340 520" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>

      <div class="form-panel">
        <img
          src="{{ url_for('static', filename='images/UWAGuessr-logo.png') }}"
          alt="UWAGuessr Logo"
          class="brand-logo"
        />
        <div class="brand-sub">Create your account</div>

        <div class="alert-area" id="alertArea"></div>

        <form id="signupForm" novalidate>
          <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input
              type="text"
              class="form-control"
              id="username"
              name="username"
              placeholder="e.g. uwa_explorer"
              autocomplete="username"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="email@example.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              placeholder="•••••••••••"
              autocomplete="new-password"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label" for="confirmPassword">Confirm Password</label>
            <input
              type="password"
              class="form-control"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="•••••••••••"
              autocomplete="new-password"
              required
            />
          </div>

          <button type="submit" class="btn-signin" id="signupBtn">
            <span class="spinner-border" role="status" aria-hidden="true"></span>
            <span class="btn-label">Create Account</span>
          </button>
        </form>

        <div class="form-footer">
          Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    $(function () {
      // ── Random pins (same as login) ────────────────────────────────────────
      const NUM_PINS = 5;
      const MARGIN = 20, W = 340, H = 520;
      const SVG_NS = "http://www.w3.org/2000/svg";
      const PIN_COLOURS = [
        "#E24B4A","#185FA5","#8B3FBF","#F2C94C","#000000",
        "#FF2D55","#00C7FF","#FF8C00","#FFD700","#FF1493",
      ];

      function makeSVGEl(tag, attrs) {
        const el = document.createElementNS(SVG_NS, tag);
        $.each(attrs, function (k, v) { el.setAttribute(k, v); });
        return el;
      }

      const svg = $("svg")[0];
      for (let i = 0; i < NUM_PINS; i++) {
        const cx = MARGIN + Math.random() * (W - MARGIN * 2);
        const cy = MARGIN + 18 + Math.random() * (H - MARGIN * 2 - 18);
        const colour = PIN_COLOURS[Math.floor(Math.random() * PIN_COLOURS.length)];
        const g = document.createElementNS(SVG_NS, "g");
        g.setAttribute("class", "pin");
        g.style.animationDelay = i * 0.3 + "s";
        g.appendChild(makeSVGEl("circle", { cx, cy, r: 11, fill: colour }));
        g.appendChild(makeSVGEl("polygon", {
          points: `${cx},${cy+18} ${cx-7},${cy+8} ${cx+7},${cy+8}`,
          fill: colour,
        }));
        g.appendChild(makeSVGEl("circle", { cx, cy, r: 4.5, fill: "white" }));
        svg.appendChild(g);
      }

      // ── Helpers ────────────────────────────────────────────────────────────
      function showAlert(message, type) {
        const html =
          '<div class="alert alert-' + type + ' alert-dismissible fade show py-2 px-3 mb-0" role="alert" style="font-size:13.5px;">' +
          message +
          '<button type="button" class="btn-close btn-sm" data-bs-dismiss="alert" aria-label="Close"></button>' +
          '</div>';
        $("#alertArea").html(html);
      }

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      // ── Signup form submit ─────────────────────────────────────────────────
      $("#signupForm").on("submit", function (e) {
        e.preventDefault();

        const username = $("#username").val().trim();
        const email = $("#email").val().trim();
        const password = $("#password").val();
        const confirmPassword = $("#confirmPassword").val();

        if (!username) {
          showAlert("Please enter a username.", "danger");
          $("#username").trigger("focus");
          return;
        }
        if (username.length < 3) {
          showAlert("Username must be at least 3 characters.", "danger");
          $("#username").trigger("focus");
          return;
        }
        if (!email || !isValidEmail(email)) {
          showAlert("Please enter a valid email address.", "danger");
          $("#email").trigger("focus");
          return;
        }
        if (!password || password.length < 6) {
          showAlert("Password must be at least 6 characters.", "danger");
          $("#password").trigger("focus");
          return;
        }
        if (password !== confirmPassword) {
          showAlert("Passwords do not match.", "danger");
          $("#confirmPassword").trigger("focus");
          return;
        }

        const $btn = $("#signupBtn");
        $btn.addClass("loading").prop("disabled", true);
        $btn.find(".btn-label").text("Creating account…");

        $.ajax({
          url: "/api/signup",
          method: "POST",
          contentType: "application/json",
          data: JSON.stringify({ username, email, password }),
          success: function () {
            showAlert("Account created! Redirecting to login…", "success");
            setTimeout(function () {
              window.location.href = "{{ url_for('login') }}";
            }, 1200);
          },
          error: function (xhr) {
            let msg = "Something went wrong. Please try again.";
            if (xhr.status === 409) {
              const data = xhr.responseJSON || {};
              msg = data.error || "An account with those details already exists.";
            }
            if (xhr.status === 400) msg = "Please fill in all fields correctly.";
            showAlert(msg, "danger");
          },
          complete: function () {
            $btn.removeClass("loading").prop("disabled", false);
            $btn.find(".btn-label").text("Create Account");
          },
        });
      });

      $("#username").trigger("focus");
    });
  </script>
{% endblock %}

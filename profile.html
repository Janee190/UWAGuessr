<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <title>Profile</title>
  </head>
  
  <body style="background-color: rgb(10, 16, 40);">

    <main class="container py-5">
      <section class="card signup-card text-light mb-4" aria-label="User profile summary">
        <div class="row no-gutters">
          <div class="col-md-4">
            <div class="p-4 text-center text-md-left border-right border-secondary">
              <img
                id="profile-picture"
                class="img-fluid rounded-circle mb-3 border border-warning border-3"
                width="130"
                height="130"
                src="https://images.unsplash.com/photo-1774173511915-c1777df1560f?q=80&w=400&h=400&auto=format&fit=crop"
                alt="Profile picture of account owner"
              >
              <h1 id="account-name" class="h3 mb-1" style="font-family: 'Bitcount Single', monospace;">Etienne Unai</h1>
              <p class="text-light opacity-75 mb-0">@etienneunai</p>
            </div>
          </div>
          <div class="col-md-8">
            <div class="p-4">
              <h2 class="h5 mb-4" style="font-family: 'Orbitron', sans-serif;">Profile Stats</h2>

              <div class="mb-4">
                <div class="d-flex align-items-end justify-content-between">
                  <div>
                    <p class="text-light opacity-75 mb-1 bangers-font">Total Score</p>
                    <p id="score" class="display-4 text-warning mb-0" style="font-family: 'Russo One', sans-serif;">12,480</p>
                  </div>
                  <div class="text-right mb-2 text-end">
                    <p class="text-light opacity-75 mb-1 bangers-font">Leaderboard Rank</p>
                    <p id="rank" class="h4 text-warning mb-0 fw-bold">#24</p>
                  </div>
                </div>
              </div>

              <div>
                <div class="d-flex align-items-center justify-content-between mb-2">
                  <span id="level" class="badge bg-warning text-dark px-3 py-2" style="font-family: 'Press Start 2P', sans-serif; font-size: 0.7rem;">Level 7</span>
                  <span id="xp" class="text-light opacity-75">420 / 600 XP</span>
                </div>
                <div class="progress bg-dark" role="progressbar" aria-label="Level progress" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100">
                  <div class="progress-bar bg-warning" style="width: 70%"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="card signup-card text-light mt-4" aria-label="Recent games">
        <div class="card-body">
          <h2 class="h4 mb-4 text-center" style="font-family: 'Orbitron', sans-serif;">Recent Games</h2>
          <ul class="list-group list-group-flush bg-transparent">
            <li class="list-group-item d-flex justify-content-between align-items-center px-3 bg-transparent text-light border-secondary">
              <span class="opacity-75">26 Mar 2026</span>
              <span class="fw-bold text-warning" style="font-family: 'Russo One', sans-serif;">2,560</span>
            </li>
            <li class="list-group-item d-flex justify-content-between align-items-center px-3 bg-transparent text-light border-secondary">
              <span class="opacity-75">24 Mar 2026</span>
              <span class="fw-bold text-warning" style="font-family: 'Russo One', sans-serif;">2,430</span>
            </li>
            <li class="list-group-item d-flex justify-content-between align-items-center px-3 bg-transparent text-light border-secondary">
              <span class="opacity-75">22 Mar 2026</span>
              <span class="fw-bold text-warning" style="font-family: 'Russo One', sans-serif;">2,680</span>
            </li>
            <li class="list-group-item d-flex justify-content-between align-items-center px-3 bg-transparent text-light border-secondary">
              <span class="opacity-75">20 Mar 2026</span>
              <span class="fw-bold text-warning" style="font-family: 'Russo One', sans-serif;">2,350</span>
            </li>
            <li class="list-group-item d-flex justify-content-between align-items-center px-3 bg-transparent text-light border-secondary border-bottom-0">
              <span class="opacity-75">18 Mar 2026</span>
              <span class="fw-bold text-warning" style="font-family: 'Russo One', sans-serif;">2,460</span>
            </li>
          </ul>
        </div>
      </section>
    </main>
    

    <!-- Optional JavaScript -->
    <!-- Bootstrap JS bundle (which includes Popper) matching the index.html -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

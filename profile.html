<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <title>Profile</title>
  </head>
  <body>
    <main class="container py-5">
      <section class="card" aria-label="User profile summary">
        <div class="row no-gutters">
          <div class="col-md-4">
            <div class="p-4 text-center text-md-left border-right">
              <img
                id="profile-picture"
                class="img-fluid rounded-circle mb-3"
                width="130"
                height="130"
                src="https://images.unsplash.com/photo-1774173511915-c1777df1560f?q=80&w=400&h=400&auto=format&fit=crop"
                alt="Profile picture of account owner"
              >
              <h1 id="account-name" class="h3 mb-1">Etienne Unai</h1>
              <p class="text-muted mb-0">@etienneunai</p>
            </div>
          </div>
          <div class="col-md-8">
            <div class="p-4">
              <h2 class="h5 mb-4">Profile Stats</h2>

              <div class="mb-4">
                <div class="d-flex align-items-end justify-content-between">
                  <div>
                    <p class="text-muted mb-1">Total Score</p>
                    <p id="score" class="display-4 mb-0">12,480</p>
                  </div>
                  <div class="text-right mb-2">
                    <p class="text-muted mb-1">Leaderboard Rank</p>
                    <p id="rank" class="h4 mb-0">#24</p>
                  </div>
                </div>
              </div>

              <div>
                <div class="d-flex align-items-center justify-content-between mb-2">
                  <span id="level" class="badge badge-primary">Level 7</span>
                  <span id="xp" class="text-muted">420 / 600 XP</span>
                </div>
                <div class="progress" role="progressbar" aria-label="Level progress" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100">
                  <div class="progress-bar" style="width: 70%"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="card mt-4" aria-label="Recent games">
        <div class="card-body">
          <h2 class="h5 mb-3">Recent Games</h2>
          <ul class="list-group list-group-flush">
            <li class="list-group-item d-flex justify-content-between align-items-center px-0">
              <span class="text-muted">26 Mar 2026</span>
              <span class="font-weight-bold">2,560</span>
            </li>
            <li class="list-group-item d-flex justify-content-between align-items-center px-0">
              <span class="text-muted">24 Mar 2026</span>
              <span class="font-weight-bold">2,430</span>
            </li>
            <li class="list-group-item d-flex justify-content-between align-items-center px-0">
              <span class="text-muted">22 Mar 2026</span>
              <span class="font-weight-bold">2,680</span>
            </li>
            <li class="list-group-item d-flex justify-content-between align-items-center px-0">
              <span class="text-muted">20 Mar 2026</span>
              <span class="font-weight-bold">2,350</span>
            </li>
            <li class="list-group-item d-flex justify-content-between align-items-center px-0">
              <span class="text-muted">18 Mar 2026</span>
              <span class="font-weight-bold">2,460</span>
            </li>
          </ul>
        </div>
      </section>
    </main>
    

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
  </body>
</html>
